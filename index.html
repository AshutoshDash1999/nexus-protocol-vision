    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Nexus Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for a more futuristic feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #111827; 
      }
      ::-webkit-scrollbar-thumb {
        background: #374151;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4B5563;
      }

      /* Custom Focus Ring for Accessibility & Style */
      :focus-visible {
        outline: 2px solid var(--theme-focus-ring, #6366f1) !important;
        outline-offset: 2px;
        box-shadow: 0 0 0 4px var(--theme-focus-ring-shadow, rgba(99, 102, 241, 0.2));
        border-radius: 0.375rem; /* 6px */
      }
      /* Remove default outline on focus when custom ring is applied */
      :focus {
        outline: none;
      }


      /* Animations */
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-out forwards;
      }

      @keyframes shimmer {
        100% {
          transform: translateX(100%);
        }
      }
      .animate-shimmer {
        animation: shimmer 1.5s infinite;
      }

      @keyframes pulse {
        50% {
          opacity: 0.5;
        }
      }
      .animate-pulse-node {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
